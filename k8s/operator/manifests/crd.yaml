apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sgraaldeployments.sgraal.com
spec:
  group: sgraal.com
  scope: Namespaced
  names:
    plural: sgraaldeployments
    singular: sgraaldeployment
    kind: SgraalDeployment
    shortNames:
      - sgd
      - sgraal
    categories:
      - sgraal
      - all
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Domain
          type: string
          jsonPath: .spec.domain
        - name: Threshold
          type: integer
          jsonPath: .spec.blockThreshold
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: LastSync
          type: string
          jsonPath: .status.lastSyncTime
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - apiKeySecret
                - redisUrlSecret
                - supabaseUrlSecret
              properties:
                replicas:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 2
                  description: Number of Sgraal API pod replicas.
                apiKeySecret:
                  type: string
                  minLength: 1
                  description: Name of the Secret containing Sgraal API keys
                    (ATTESTATION_SECRET, PASSPORT_SIGNING_KEY_V1, UNSUB_HMAC_SECRET).
                redisUrlSecret:
                  type: string
                  minLength: 1
                  description: Name of the Secret containing Upstash Redis
                    credentials (UPSTASH_REDIS_URL, UPSTASH_REDIS_TOKEN).
                supabaseUrlSecret:
                  type: string
                  minLength: 1
                  description: Name of the Secret containing Supabase
                    credentials (SUPABASE_URL, SUPABASE_SERVICE_KEY).
                domain:
                  type: string
                  enum:
                    - general
                    - customer_support
                    - coding
                    - legal
                    - fintech
                    - medical
                  default: general
                  description: Sgraal domain profile applied to scoring.
                blockThreshold:
                  type: integer
                  minimum: 0
                  maximum: 100
                  default: 70
                  description: Omega score threshold above which preflight
                    returns BLOCK.
                image:
                  type: string
                  default: sgraal-api:latest
                  description: Container image for the Sgraal API deployment.
            status:
              type: object
              properties:
                ready:
                  type: boolean
                  description: True when the managed Deployment has been
                    reconciled successfully.
                replicas:
                  type: integer
                  description: Reconciled replica count.
                lastSyncTime:
                  type: string
                  format: date-time
                  description: ISO-8601 timestamp of the last successful
                    reconcile.
