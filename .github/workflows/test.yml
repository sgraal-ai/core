name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt && pip install pytest httpx
      - run: pip install -e sdk/python/
      - run: python -m pytest tests/ -v --tb=short --ignore=tests/test_compatibility_suite.py -k "not TestImmunityCertificate"
