name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt && pip install pytest httpx
      - run: pip install -e sdk/python/ || pip install sdk/python/ || true
      - name: Clear bytecode cache
        run: find . -name "*.pyc" -delete && find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/sdk/python:${{ github.workspace }}
        run: python -m pytest tests/ -v --tb=short --ignore=tests/test_compatibility_suite.py --ignore=web-static -k "not TestImmunityCertificate and not TestPageExists"
