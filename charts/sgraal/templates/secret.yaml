apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sgraal.fullname" . }}-secrets
  labels:
    {{- include "sgraal.labels" . | nindent 4 }}
type: Opaque
stringData:
  SUPABASE_URL: {{ .Values.secrets.supabaseUrl | quote }}
  SUPABASE_KEY: {{ .Values.secrets.supabaseKey | quote }}
  SUPABASE_SERVICE_KEY: {{ .Values.secrets.supabaseServiceKey | quote }}
  STRIPE_SECRET_KEY: {{ .Values.secrets.stripeSecretKey | quote }}
  UPSTASH_REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  UPSTASH_REDIS_TOKEN: {{ .Values.secrets.redisToken | quote }}
  ATTESTATION_SECRET: {{ .Values.secrets.attestationSecret | quote }}
  PASSPORT_SIGNING_KEY_V1: {{ .Values.secrets.passportSigningKey | quote }}
  UNSUB_HMAC_SECRET: {{ .Values.secrets.unsubHmacSecret | quote }}
